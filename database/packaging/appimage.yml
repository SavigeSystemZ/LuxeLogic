version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/database AppDir/usr/bin/database
  - install -Dm644 ./packaging/io.aiaast.database.desktop AppDir/usr/share/applications/io.aiaast.database.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.database
    name: database
    icon: io.aiaast.database
    version: 0.1.0
    exec: usr/bin/database
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/database
      APP_DATA_DIR: /var/lib/database

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
