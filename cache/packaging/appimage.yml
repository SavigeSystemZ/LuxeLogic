version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/cache AppDir/usr/bin/cache
  - install -Dm644 ./packaging/io.aiaast.cache.desktop AppDir/usr/share/applications/io.aiaast.cache.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.cache
    name: cache
    icon: io.aiaast.cache
    version: 0.1.0
    exec: usr/bin/cache
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/cache
      APP_DATA_DIR: /var/lib/cache

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
