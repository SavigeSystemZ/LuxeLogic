version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/template AppDir/usr/bin/template
  - install -Dm644 ./packaging/io.aiaast.template.desktop AppDir/usr/share/applications/io.aiaast.template.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.template
    name: TEMPLATE
    icon: io.aiaast.template
    version: 0.1.0
    exec: usr/bin/template
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/template
      APP_DATA_DIR: /var/lib/template

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
