version: '3.8'

services:
  api-gateway:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "38280:80"
      - "38281:8080" # Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - luxelogic_net

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LUXELOGIC_POSTGRES_USER:-luxeadmin}
      POSTGRES_PASSWORD: ${LUXELOGIC_POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${LUXELOGIC_POSTGRES_DB:-luxelogic}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - luxelogic_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LUXELOGIC_POSTGRES_USER:-luxeadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly-cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    ulimits:
      memlock: -1
    expose:
      - "6379"
    networks:
      - luxelogic_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-media-server:
    image: tiangolo/nginx-rtmp
    ports:
      - "38235:1935" # RTMP
      - "38288:80"   # HLS HTTP playback
    volumes:
      - media_storage:/usr/local/nginx/html/media
    networks:
      - luxelogic_net

  core-service:
    build: ./core-service
    depends_on:
      postgres-db:
        condition: service_healthy
      dragonfly-cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LUXELOGIC_POSTGRES_USER:-luxeadmin}:${LUXELOGIC_POSTGRES_PASSWORD:-change-me}@postgres-db:5432/${LUXELOGIC_POSTGRES_DB:-luxelogic}
      CACHE_URL: ${LUXELOGIC_CACHE_URL:-redis://dragonfly-cache:6379/0}
    networks:
      - luxelogic_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core-service.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.core-service.middlewares=core-strip-prefix"
      - "traefik.http.middlewares.core-strip-prefix.stripprefix.prefixes=/api"
      - "traefik.http.services.core-service.loadbalancer.server.port=8000"

  video-engine:
    build: ./video-engine
    command: ["celery", "-A", "src.worker.celery_app", "worker", "--loglevel=info"]
    environment:
      CACHE_URL: ${LUXELOGIC_CACHE_URL:-redis://dragonfly-cache:6379/0}
    volumes:
      - media_storage:/app/media
    networks:
      - luxelogic_net

networks:
  luxelogic_net:
    driver: bridge

volumes:
  pgdata:
  media_storage:
