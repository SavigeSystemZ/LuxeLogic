version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/api-gateway AppDir/usr/bin/api-gateway
  - install -Dm644 ./packaging/io.aiaast.api.gateway.desktop AppDir/usr/share/applications/io.aiaast.api.gateway.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.api.gateway
    name: api-gateway
    icon: io.aiaast.api.gateway
    version: 0.1.0
    exec: usr/bin/api-gateway
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/api-gateway
      APP_DATA_DIR: /var/lib/api-gateway

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
