services:
  app:
    image: ghcr.io/example/api-gateway:latest
    restart: unless-stopped
    env_file:
      - ../env/.env
    network_mode: bridge
    ports:
      - "127.0.0.1:${APP_PORT:-38301}:${APP_PORT:-38301}"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: api-gateway
      POSTGRES_USER: api-gateway
      POSTGRES_PASSWORD: change-me
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-45631}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
