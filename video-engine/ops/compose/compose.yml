services:
  app:
    image: ghcr.io/example/video-engine:latest
    restart: unless-stopped
    env_file:
      - ../env/.env
    network_mode: bridge
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:${APP_PORT:-8080}"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: video-engine
      POSTGRES_USER: video-engine
      POSTGRES_PASSWORD: change-me
    ports:
      - "127.0.0.1:55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
