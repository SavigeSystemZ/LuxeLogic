version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/video-engine AppDir/usr/bin/video-engine
  - install -Dm644 ./packaging/io.aiaast.video.engine.desktop AppDir/usr/share/applications/io.aiaast.video.engine.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.video.engine
    name: video-engine
    icon: io.aiaast.video.engine
    version: 0.1.0
    exec: usr/bin/video-engine
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/video-engine
      APP_DATA_DIR: /var/lib/video-engine

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
