version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/core-service AppDir/usr/bin/core-service
  - install -Dm644 ./packaging/io.aiaast.core.service.desktop AppDir/usr/share/applications/io.aiaast.core.service.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.core.service
    name: core-service
    icon: io.aiaast.core.service
    version: 0.1.0
    exec: usr/bin/core-service
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/core-service
      APP_DATA_DIR: /var/lib/core-service

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
