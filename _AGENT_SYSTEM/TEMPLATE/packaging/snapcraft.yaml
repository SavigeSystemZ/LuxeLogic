name: template
base: core24
version: "0.1.0"
summary: TEMPLATE packaged from an AIAST project scaffold
description: |
  Generic Snap scaffold for TEMPLATE.
  Review plugs, confinement, and launch command before release.

grade: devel
confinement: strict

apps:
  template:
    command: bin/template
    plugs:
      - network
      - network-bind
      - home

parts:
  template:
    plugin: dump
    source: .
    organize:
      dist/template: bin/template
