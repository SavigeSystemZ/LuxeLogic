version: '3.8'

services:
  api-gateway:
    image: traefik:latest
    # environment:
    #   - DOCKER_API_VERSION=1.40
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.buckets=0.1,0.3,1.2,5.0"
    ports:
      - "38280:80"
      - "38281:8080" # Dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    networks:
      - luxelogic_net

  postgres-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LUXELOGIC_POSTGRES_USER:-luxeadmin}
      POSTGRES_PASSWORD: ${LUXELOGIC_POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${LUXELOGIC_POSTGRES_DB:-luxelogic}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - luxelogic_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LUXELOGIC_POSTGRES_USER:-luxeadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  dragonfly-cache:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    restart: unless-stopped
    ulimits:
      memlock: -1
    expose:
      - "6379"
    networks:
      - luxelogic_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-media-server:
    image: tiangolo/nginx-rtmp
    ports:
      - "38235:1935" # RTMP
      - "38288:80"   # HLS HTTP playback
    volumes:
      - media_storage:/usr/local/nginx/html/media
    networks:
      - luxelogic_net

  core-service:
    build: ./core-service
    depends_on:
      postgres-db:
        condition: service_healthy
      dragonfly-cache:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${LUXELOGIC_POSTGRES_USER:-luxeadmin}:${LUXELOGIC_POSTGRES_PASSWORD:-change-me}@postgres-db:5432/${LUXELOGIC_POSTGRES_DB:-luxelogic}
      CACHE_URL: ${LUXELOGIC_CACHE_URL:-redis://dragonfly-cache:6379/0}
    ports:
      - "38289:8000"
    volumes:
      - media_storage:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    networks:
      - luxelogic_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.core-service.rule=PathPrefix(`/api/`)"
      - "traefik.http.routers.core-service.middlewares=core-strip-prefix"
      - "traefik.http.middlewares.core-strip-prefix.stripprefix.prefixes=/api"
      - "traefik.http.services.core-service.loadbalancer.server.port=8000"

  video-engine:
    build: ./video-engine
    command: ["celery", "-A", "src.worker.celery_app", "worker", "--loglevel=info"]
    environment:
      CACHE_URL: ${LUXELOGIC_CACHE_URL:-redis://dragonfly-cache:6379/0}
    volumes:
      - media_storage:/app/media
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - luxelogic_net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "38290:9090"
    networks:
      - luxelogic_net

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=luxelogic-admin
    ports:
      - "38291:3000"
    networks:
      - luxelogic_net
    depends_on:
      - prometheus

  beauty-frontend:
    build: ./beauty-frontend
    ports:
      - "38282:3000"
    environment:
      - NEXT_PUBLIC_API_URL=/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:38280/api
    networks:
      - luxelogic_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.beauty-frontend.rule=PathPrefix(`/`)"
      - "traefik.http.services.beauty-frontend.loadbalancer.server.port=3000"

networks:
  luxelogic_net:
    driver: bridge

volumes:
  pgdata:
  media_storage:
